<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录 - 抖音数据分析系统</title>
    <!-- 引入Google字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* *全局重置和基础样式* */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* *动态背景效果* */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #0f172a, #020617);
            background-size: 400% 400%;
            animation: auroraFlow 60s ease infinite;
            overflow: hidden;
            position: relative;
        }

        /* *背景渐变动画关键帧* */
        @keyframes auroraFlow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* *背景装饰元素* */
        .decoration-circle-1,
        .decoration-circle-2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s ease-in-out infinite;
        }

        .decoration-circle-1 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.4);
            /* Indigo */
            top: -100px;
            left: -100px;
        }

        .decoration-circle-2 {
            width: 300px;
            height: 300px;
            background: rgba(236, 72, 153, 0.3);
            /* Pink */
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        /* *悬浮动画* */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        /* *玻璃拟态登录卡片* */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 1;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* *卡片入场动画* */
        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* *标题模块* */
        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-header h2 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: #94a3b8;
            font-size: 14px;
        }

        /* *表单元素样式* */
        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-label {
            display: block;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            transition: color 0.3s;
        }

        .form-control {
            width: 100%;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        /* *输入框聚焦效果* */
        .form-control:focus {
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.6);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
            animation: inputPulse 2s infinite;
        }

        /* *脉冲呼吸灯效果* */
        @keyframes inputPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(56, 189, 248, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(56, 189, 248, 0);
            }
        }

        .form-group:focus-within .form-label {
            color: #6366f1;
        }

        /* *错误提示块* */
        .error-alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        /* *错误抖动动画* */
        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        /* *提交按钮* */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* *按钮闪光效果* */
        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            transition: all 0.5s;
        }

        .btn-submit:hover::after {
            left: 200%;
            transition: 0.7s;
        }

        /* *底部链接区域* */
        .card-footer {
            margin-top: 24px;
            text-align: center;
        }

        .link-text {
            color: #94a3b8;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .link-text:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        /* *响应式设计* */
        @media (max-width: 480px) {
            .login-card {
                margin: 20px;
                padding: 30px 20px;
            }
        }

        /* *AI小怪兽样式* */
        .ai-sentinel {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 60px;
            background: rgba(56, 189, 248, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.5);
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2), inset 0 0 15px rgba(56, 189, 248, 0.1);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            animation: sentinelFloat 3s ease-in-out infinite;
            cursor: default;
        }

        /* *小怪兽呼吸悬浮动画* */
        @keyframes sentinelFloat {

            0%,
            100% {
                transform: translateY(0);
                box-shadow: 0 0 20px rgba(56, 189, 248, 0.2), inset 0 0 15px rgba(56, 189, 248, 0.1);
            }

            50% {
                transform: translateY(-10px);
                box-shadow: 0 0 30px rgba(56, 189, 248, 0.4), inset 0 0 20px rgba(56, 189, 248, 0.2);
            }
        }

        /* *眼睛外部轮廓* */
        .sentinel-eye {
            width: 22px;
            height: 22px;
            background: #ffffff;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.9);
            transform-origin: center center;
            will-change: transform;
        }

        /* *瞳孔* */
        .sentinel-pupil {
            width: 8px;
            height: 8px;
            background: #020617;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            right: 2px;
            margin-top: -4px;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s;
        }

        /* *小怪兽情感互动状态 - 爪子遮眼与闭眼* */
        .sentinel-paw {
            position: absolute;
            width: 20px;
            height: 16px;
            background: rgba(56, 189, 248, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            bottom: -20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.6);
        }

        .paw-left {
            left: 12px;
        }

        .paw-right {
            right: 12px;
        }

        .ai-sentinel.eyes-closed .sentinel-paw {
            bottom: 22px;
            opacity: 1;
        }

        .ai-sentinel.eyes-closed .sentinel-pupil {
            opacity: 0;
        }

        .ai-sentinel.eyes-closed .sentinel-eye {
            box-shadow: 0 0 2px rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.3);
        }

        /* *小怪兽情感互动状态 - 摇头(错误反馈)* */
        .ai-sentinel.shake-head {
            animation: sentinelShake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes sentinelShake {

            10%,
            90% {
                transform: translateX(-2px);
            }

            20%,
            80% {
                transform: translateX(4px);
            }

            30%,
            50%,
            70% {
                transform: translateX(-8px);
            }

            40%,
            60% {
                transform: translateX(8px);
            }
        }
    </style>
</head>

<body>
    <!-- 背景装饰 -->
    <div class="decoration-circle-1"></div>
    <div class="decoration-circle-2"></div>

    <!-- 登录主体卡片 -->
    <div class="login-card">
        <div class="login-header">
            <h2>抖音数据分析系统</h2>
            <p>登录以探索多模态热点数据</p>
        </div>

        <form method="post" id="loginForm">
            {% csrf_token %}

            {% if form.errors %}
            <div class="error-alert">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                用户名或密码错误
            </div>
            {% endif %}

            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="请输入用户名" required
                    autofocus autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>

            <button type="submit" class="btn-submit">
                立即登录
            </button>
        </form>

        <div class="card-footer">
            <a href="{% url 'register' %}" class="link-text">还没有账号？点击注册</a>
        </div>
    </div>

    <!-- AI小怪兽组件 -->
    <div class="ai-sentinel" id="aiSentinel">
        <div class="sentinel-paw paw-left"></div>
        <div class="sentinel-paw paw-right"></div>
        <div class="sentinel-eye" id="eyeLeft">
            <div class="sentinel-pupil"></div>
        </div>
        <div class="sentinel-eye" id="eyeRight">
            <div class="sentinel-pupil"></div>
        </div>
    </div>

    <script>
        /* *添加简单的交互动画效果* */
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            const btn = this.querySelector('.btn-submit');
            btn.innerHTML = '<span style="display:inline-block; animation: spin 1s linear infinite;">↻</span> 正在登录...';
            btn.style.opacity = '0.8';
            btn.style.cursor = 'not-allowed';
        });

        /* *加载微小样式动画* */
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin { 100% { transform: rotate(360deg); } }
        `;
        document.head.appendChild(style);

        /* *小怪兽眼珠跟随逻辑与情感化交互* */
        const aiSentinel = document.getElementById('aiSentinel');
        const eyeLeft = document.getElementById('eyeLeft');
        const eyeRight = document.getElementById('eyeRight');

        let isSentinelTracking = false;

        window.addEventListener('mousemove', function (e) {
            if (isSentinelTracking) return;
            isSentinelTracking = true;

            requestAnimationFrame(() => {
                try {
                    const mouseX = e.clientX;
                    const mouseY = e.clientY;

                    /* *分离 DOM 的读与写，防止 Layout Thrashing* */
                    // *读阶段：批量获取边界矩形*
                    const eyeStates = [eyeLeft, eyeRight].map(eye => {
                        if (!eye) return null;
                        const rect = eye.getBoundingClientRect();
                        return {
                            eye: eye,
                            centerX: rect.left + rect.width / 2,
                            centerY: rect.top + rect.height / 2
                        };
                    }).filter(Boolean);

                    /* *写阶段：批量应用 CSS 属性* */
                    if (!aiSentinel.classList.contains('eyes-closed')) {
                        eyeStates.forEach(info => {
                            /* *计算夹角* */
                            const angle = Math.atan2(mouseY - info.centerY, mouseX - info.centerX);
                            /* *弧度转角度* */
                            const angleDeg = angle * (180 / Math.PI);
                            info.eye.style.transform = `rotate(${angleDeg}deg)`;
                        });
                    }
                } catch (error) {
                    /* *错误处理保障主流程不受影响* */
                    console.error("AI Sentinel tracking error:", error);
                } finally {
                    isSentinelTracking = false;
                }
            });
        });

        /* *密码框防偷窥交互(闭眼)* */
        const passwordInput = document.getElementById('password');
        if (passwordInput) {
            passwordInput.addEventListener('focus', () => {
                aiSentinel.classList.add('eyes-closed');
            });
            passwordInput.addEventListener('blur', () => {
                aiSentinel.classList.remove('eyes-closed');
            });
        }

        /* *表单错误交互(摇头)* */
        const hasError = document.querySelector('.error-alert');
        if (hasError) {
            setTimeout(() => {
                aiSentinel.classList.add('shake-head');
                /* *动画结束后移除类，以便下次可再次触发* */
                setTimeout(() => aiSentinel.classList.remove('shake-head'), 400);
            }, 300);
        }
    </script>
</body>

</html>
